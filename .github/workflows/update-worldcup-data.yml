name: Update World Cup Data

on:
  schedule:
    # 13:00 Asia/Shanghai = 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-worldcup-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Refresh World Cup data
        run: npm run update:worldcup

      - name: Verify
        run: npm run build && npm run check:mcp

      - name: Commit updated data
        run: |
          if git diff --quiet -- src/worldcupData.ts; then
            echo "No World Cup data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/worldcupData.ts
          git commit -m "Update World Cup data snapshot"
          git push
